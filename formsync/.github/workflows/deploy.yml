name: Deploy FormSync to EC2

on:
  push:
    branches: [Deployment, net-bug-fix]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: JWT_SECRET,OPENAI_API_KEY,DATABASE_URL,POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB
          command_timeout: 30m
          script: |
            set -e
            echo "Starting deployment..."

            # ================================
            # Install Docker
            # ================================
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker via apt..."
              sudo apt-get update -qq
              sudo apt-get install -y docker.io
              sudo systemctl enable docker
              sudo systemctl start docker
              sudo usermod -aG docker $USER
            else
              echo "Docker already installed"
            fi

            # Install Docker Compose v2 plugin if missing
            if ! docker compose version &> /dev/null 2>&1; then
              echo "Installing Docker Compose v2..."
              COMPOSE_VERSION="v2.24.7"
              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              sudo curl -fsSL "https://github.com/docker/compose/releases/download/${COMPOSE_VERSION}/docker-compose-linux-x86_64" \
                -o /usr/local/lib/docker/cli-plugins/docker-compose
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
            fi

            # Fix docker socket permission for current session without newgrp
            if ! docker ps > /dev/null 2>&1; then
              sudo chmod 666 /var/run/docker.sock
            fi

            echo "Docker version:"
            docker --version
            echo "Compose version:"
            docker compose version

            # Compose wrapper
            dc() {
              docker compose "$@"
            }

            # ================================
            # Setup project
            # ================================
            mkdir -p ~/formsync
            cd ~/formsync

            if [ -d ".git" ]; then
              echo "Updating repo..."
              git fetch origin
              git reset --hard origin/Deployment
            else
              echo "Cloning repo..."
              rm -rf ./* .[^.]* 2>/dev/null || true
              git clone https://github.com/${{ github.repository }}.git .
              git checkout Deployment
            fi

            cd formsync

            # ================================
            # Verify compose file
            # ================================
            if [ ! -f docker-compose.yml ]; then
              echo "docker-compose.yml not found!"
              exit 1
            fi

            # ================================
            # Write .env (no heredoc — avoids YAML indentation conflict)
            # Secrets are passed as env vars via the envs: parameter above
            # ================================
            echo "Creating .env..."
            {
              echo "NODE_ENV=production"
              echo "JWT_EXPIRES_IN=7d"
              echo ""
              echo "OPENAI_BASE_URL=https://api.groq.com/openai/v1"
              echo "OPENAI_MODEL=llama-3.3-70b-versatile"
              echo ""
              echo "GATEWAY_PORT=3000"
              echo "SCHEMA_ENGINE_PORT=3010"
              echo "USER_SERVICE_PORT=3011"
              echo "DTO_GENERATOR_PORT=3012"
              echo "RUNTIME_ENGINE_PORT=3013"
              echo "FORMGEN_SERVICE_PORT=3014"
              echo "NODE_BACKEND_GENERATOR_PORT=3015"
              echo "DOTNET_BACKEND_GENERATOR_PORT=3016"
              echo ""
              echo "SCHEMA_ENGINE_URL=http://schema-enhancement-engine:3010"
              echo "USER_SERVICE_URL=http://user-management-service:3011"
              echo "DTO_GENERATOR_URL=http://backend-dto-generator:3012"
              echo "RUNTIME_ENGINE_URL=http://runtime-binding-engine:3013"
              echo "FORMGEN_SERVICE_URL=http://formgen-service:3014"
              echo "NODE_BACKEND_GENERATOR_URL=http://node-backend-generator:3015"
              echo "DOTNET_BACKEND_GENERATOR_URL=http://dotnet-backend-generator:3016"
              echo ""
              echo "SCHEMA_API_URL=http://schema-enhancement-engine:3010/schema"
              echo "FRONTEND_URL=http://localhost"
              echo ""
              echo "DOCKER_BUILDKIT=1"
              echo "COMPOSE_DOCKER_CLI_BUILD=1"
              echo ""
              echo "NPM_CONFIG_LOGLEVEL=warn"
              echo "NPM_CONFIG_PROGRESS=false"
              echo "NPM_CONFIG_AUDIT=false"
              echo "NPM_CONFIG_FUND=false"
              echo ""
              echo "JWT_SECRET=${JWT_SECRET}"
              echo "OPENAI_API_KEY=${OPENAI_API_KEY}"
              echo "DATABASE_URL=${DATABASE_URL}"
              echo "POSTGRES_USER=${POSTGRES_USER}"
              echo "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}"
              echo "POSTGRES_DB=${POSTGRES_DB}"
            } > .env
            echo ".env created"

            # ================================
            # Cleanup
            # ================================
            echo "Cleaning old containers..."
            dc down || true
            docker system prune -af --volumes || true
            docker builder prune -af || true

            echo "Disk space:"
            df -h /

            # ================================
            # Build (sequential)
            # ================================
            echo "Building services..."
            for svc in schema-enhancement-engine user-management-service backend-dto-generator runtime-binding-engine formgen-service node-backend-generator dotnet-backend-generator api-gateway frontend; do
              echo "Building $svc..."
              dc build "$svc" || {
                echo "Retry $svc..."
                docker builder prune -af || true
                dc build "$svc"
              }
            done

            # ================================
            # Start
            # ================================
            echo "Starting services..."
            dc up -d --no-build

            sleep 15

            # ================================
            # Status
            # ================================
            echo "Containers:"
            docker ps -a

            echo "Usage:"
            docker system df

            # ================================
            # Check for failed containers
            # ================================
            FAILED=$(docker ps -a --filter "status=exited" --format "{{.Names}}")
            if [ -n "$FAILED" ]; then
              echo "Failed containers:"
              for c in $FAILED; do
                echo "==== $c logs ===="
                docker logs --tail 20 "$c"
              done
              exit 1
            fi

            echo "Deployment successful!"
